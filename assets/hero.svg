<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 70 720 420" preserveAspectRatio="xMidYMid meet">
  <title>destiny — Claude reading saju</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d1530"/>
      <stop offset="55%"  stop-color="#1c1424"/>
      <stop offset="100%" stop-color="#2a1812"/>
    </linearGradient>
    <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffae6e" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#cc4422" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#cc4422" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floorWarm" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#cc785c" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#cc785c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bodyShade" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#e9876b"/>
      <stop offset="100%" stop-color="#b85a3f"/>
    </radialGradient>
  </defs>

  <!-- Backdrop -->
  <rect x="40" y="70" width="720" height="420" fill="url(#bg)"/>

  <!-- Floating trigram symbols drawn as paths (font-independent) -->
  <g stroke="#d4b06a" stroke-width="1.6" opacity="0.25" stroke-linecap="round">
    <!-- ☷ Earth (3 broken) at (180,110) -->
    <g transform="translate(180,110)">
      <line x1="-9" y1="-6" x2="-2" y2="-6"/><line x1="2" y1="-6" x2="9" y2="-6"/>
      <line x1="-9" y1="0"  x2="-2" y2="0"/> <line x1="2" y1="0"  x2="9" y2="0"/>
      <line x1="-9" y1="6"  x2="-2" y2="6"/> <line x1="2" y1="6"  x2="9" y2="6"/>
    </g>
    <!-- ☱ Lake (broken on top) at (640,370) -->
    <g transform="translate(640,370)">
      <line x1="-9" y1="-6" x2="-2" y2="-6"/><line x1="2" y1="-6" x2="9" y2="-6"/>
      <line x1="-9" y1="0"  x2="9" y2="0"/>
      <line x1="-9" y1="6"  x2="9" y2="6"/>
    </g>
    <!-- ☵ Water (broken-solid-broken) at (80,280) -->
    <g transform="translate(80,280)">
      <line x1="-9" y1="-6" x2="-2" y2="-6"/><line x1="2" y1="-6" x2="9" y2="-6"/>
      <line x1="-9" y1="0"  x2="9" y2="0"/>
      <line x1="-9" y1="6"  x2="-2" y2="6"/> <line x1="2" y1="6"  x2="9" y2="6"/>
    </g>
    <!-- ☰ Heaven (3 solid) at (720,220) -->
    <g transform="translate(720,220)">
      <line x1="-9" y1="-6" x2="9" y2="-6"/>
      <line x1="-9" y1="0"  x2="9" y2="0"/>
      <line x1="-9" y1="6"  x2="9" y2="6"/>
    </g>
    <!-- ☴ Wind (broken on bottom) at (520,80) -->
    <g transform="translate(520,80)">
      <line x1="-9" y1="-6" x2="9" y2="-6"/>
      <line x1="-9" y1="0"  x2="9" y2="0"/>
      <line x1="-9" y1="6"  x2="-2" y2="6"/> <line x1="2" y1="6"  x2="9" y2="6"/>
    </g>
    <!-- ☶ Mountain (solid on top) at (270,60) -->
    <g transform="translate(270,60)">
      <line x1="-9" y1="-6" x2="9" y2="-6"/>
      <line x1="-9" y1="0"  x2="-2" y2="0"/> <line x1="2" y1="0"  x2="9" y2="0"/>
      <line x1="-9" y1="6"  x2="-2" y2="6"/> <line x1="2" y1="6"  x2="9" y2="6"/>
    </g>
  </g>

  <!-- Right-side hanging lantern -->
  <g transform="translate(680, 195)">
    <circle r="115" fill="url(#lanternGlow)"/>
    <line x1="0" y1="-50" x2="0" y2="-110" stroke="#7a5a3a" stroke-width="1.4"/>
    <ellipse cx="0" cy="0" rx="32" ry="40" fill="#aa3322"/>
    <ellipse cx="0" cy="0" rx="28" ry="36" fill="#cc4422"/>
    <rect x="-26" y="-10" width="52" height="2.5" fill="#3a1e10"/>
    <rect x="-26" y="10"  width="52" height="2.5" fill="#3a1e10"/>
    <text x="0" y="6" text-anchor="middle" fill="#1a0a08" font-family="serif" font-size="20" font-weight="bold">運</text>
    <rect x="-12" y="38" width="24" height="6" fill="#3a1e10"/>
    <line x1="-6"  y1="44" x2="-9"  y2="58" stroke="#cc4422" stroke-width="1"/>
    <line x1="0"   y1="44" x2="0"   y2="60" stroke="#cc4422" stroke-width="1"/>
    <line x1="6"   y1="44" x2="9"   y2="58" stroke="#cc4422" stroke-width="1"/>
  </g>

  <!-- Left-side scroll stack and small ink stone -->
  <g transform="translate(110, 360)">
    <ellipse cx="0" cy="46" rx="60" ry="6" fill="#000" opacity="0.4"/>
    <rect x="-44" y="-6"  width="88" height="13" rx="3" fill="#9a7a4a"/>
    <rect x="-46" y="7"   width="92" height="13" rx="3" fill="#7a5a3a"/>
    <rect x="-42" y="20"  width="84" height="13" rx="3" fill="#9a7a4a"/>
    <circle cx="-42" cy="0"  r="3" fill="#3a1e10"/>
    <circle cx="-44" cy="13" r="3" fill="#3a1e10"/>
    <circle cx="-40" cy="26" r="3" fill="#3a1e10"/>
    <ellipse cx="58" cy="40" rx="20" ry="6" fill="#1a1a1a"/>
    <ellipse cx="58" cy="38" rx="17" ry="4" fill="#2a2a2a"/>
  </g>

  <!-- Cushion + warm floor glow -->
  <ellipse cx="400" cy="445" rx="200" ry="22" fill="url(#floorWarm)"/>
  <ellipse cx="400" cy="438" rx="105" ry="14" fill="#3a1820" opacity="0.6"/>
  <ellipse cx="400" cy="432" rx="100" ry="12" fill="#7a3344"/>
  <path d="M -100 0 Q 0 -8 100 0" transform="translate(400,432)" stroke="#a85368" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Round Claude-style mascot — friendly orange body with sunglasses -->
  <g transform="translate(400, 310)">
    <!-- Body shadow -->
    <ellipse cx="0" cy="120" rx="80" ry="9" fill="#000" opacity="0.35"/>
    <!-- Body -->
    <circle r="80" fill="url(#bodyShade)"/>
    <!-- Tiny asterisk emblem on the upper-left of body, like a logo -->
    <g transform="translate(-50, -55) scale(0.8)">
      <path d="M0,-10 L0,10 M-10,0 L10,0 M-7,-7 L7,7 M-7,7 L7,-7" stroke="#ffe6d6" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    </g>

    <!-- Sunglasses -->
    <g transform="translate(0, -22)">
      <!-- Bridge -->
      <rect x="-8" y="-2.5" width="16" height="4" rx="1" fill="#000"/>
      <!-- Left lens -->
      <ellipse cx="-26" cy="0" rx="22" ry="15" fill="#000"/>
      <ellipse cx="-26" cy="0" rx="18.5" ry="11.5" fill="#161616"/>
      <ellipse cx="-31" cy="-5" rx="7" ry="3" fill="#fff" opacity="0.35"/>
      <ellipse cx="-22" cy="3"  rx="3" ry="1.5" fill="#fff" opacity="0.25"/>
      <!-- Right lens -->
      <ellipse cx="26" cy="0" rx="22" ry="15" fill="#000"/>
      <ellipse cx="26" cy="0" rx="18.5" ry="11.5" fill="#161616"/>
      <ellipse cx="21" cy="-5" rx="7" ry="3" fill="#fff" opacity="0.35"/>
      <ellipse cx="30" cy="3"  rx="3" ry="1.5" fill="#fff" opacity="0.25"/>
      <!-- Earpieces / temple arms -->
      <path d="M -48 0 Q -65 -2 -78 -8" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M  48 0 Q  65 -2  78 -8" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Slight knowing smile under sunglasses -->
    <path d="M -10 14 Q 0 22 10 14" stroke="#5a2818" stroke-width="2.4" fill="none" stroke-linecap="round"/>

    <!-- Two arms reaching down to hold the book -->
    <path d="M -58 40 Q -58 70 -42 86" stroke="#b85a3f" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M  58 40 Q  58 70  42 86" stroke="#b85a3f" stroke-width="11" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 사주 book in front of mascot, opened across lap -->
  <g transform="translate(400, 410)">
    <ellipse cx="0" cy="22" rx="90" ry="6" fill="#000" opacity="0.3"/>
    <path d="M -82 -12 L -8 -18 L 0 -16 L 8 -18 L 82 -12 L 82 16 L 8 20 L 0 18 L -8 20 L -82 16 Z"
          fill="#f5e8c8" stroke="#4a2a14" stroke-width="1.6"/>
    <line x1="0" y1="-16" x2="0" y2="18" stroke="#5a3a1f" stroke-width="1.2"/>
    <!-- Left page: hexagram (☲ Fire) -->
    <g stroke="#3a2010" stroke-width="2.2" stroke-linecap="round">
      <line x1="-68" y1="-6" x2="-20" y2="-6"/>
      <line x1="-68" y1="1"  x2="-46" y2="1"/>
      <line x1="-42" y1="1"  x2="-20" y2="1"/>
      <line x1="-68" y1="8"  x2="-20" y2="8"/>
    </g>
    <!-- Right page: 사주 8 chars -->
    <g fill="#3a2010" font-family="'Songti SC','Noto Serif CJK',serif" font-size="11" text-anchor="middle" font-weight="bold">
      <text x="20" y="-3">壬</text><text x="20" y="10">申</text>
      <text x="38" y="-3">丁</text><text x="38" y="10">未</text>
      <text x="56" y="-3">戊</text><text x="56" y="10">申</text>
      <text x="74" y="-3">甲</text><text x="74" y="10">寅</text>
    </g>
  </g>

  <!-- Title -->
  <text x="400" y="478" text-anchor="middle"
        font-family="Georgia, 'Iowan Old Style', serif"
        font-size="32" fill="#e8d899" letter-spacing="0.06em">destiny</text>
</svg>
